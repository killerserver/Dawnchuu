<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포인트 계산기</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Pretendard:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Pretendard;
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:420px;
background:rgba(10,15,35,0.8);
backdrop-filter:blur(10px);
border:1px solid rgba(0,255,255,0.2);
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,0.2);
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 60px rgba(0,255,255,0.5);
}

.title{
font-family:Orbitron;
font-size:28px;
color:#00ffff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #00ffff;
background:#0b1026;
color:white;
margin-bottom:15px;
outline:none;
}

.total{
font-size:22px;
margin-bottom:20px;
color:#00ffff;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.undo{
background:#111633;
color:white;
border:1px solid #00ffff;
}

.reset{
background:#00ffff;
color:black;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<div class="title">POINT CALCULATOR</div>

<input type="number" id="pointInput" placeholder="숫자 입력 후 Enter">

<div class="total" id="total">총합: 0</div>

<div class="buttons">
<button class="undo" id="undoBtn">뒤로가기</button>
<button class="reset" id="resetBtn">초기화</button>
</div>

</div>

<script>

let total = 0;
let history = [];

const input = document.getElementById('pointInput');
const totalDiv = document.getElementById('total');
const undoBtn = document.getElementById('undoBtn');
const resetBtn = document.getElementById('resetBtn');

function updateTotal(){
totalDiv.textContent = "총합: " + total;
}

input.addEventListener('keydown', function(e){
if(e.key === 'Enter'){
const value = parseInt(input.value);

if(!isNaN(value)){
total += value;
history.push(value);
updateTotal();
}

input.value = '';
}
});

undoBtn.addEventListener('click', function(){
if(history.length > 0){
total -= history.pop();
updateTotal();
}
});

resetBtn.addEventListener('click', function(){
total = 0;
history = [];
updateTotal();
});

</script>

</body>
</html>
